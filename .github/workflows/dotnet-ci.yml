name: VetClinic CI

on:
  push:
    branches: [ main, 'feat/**' ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Unit Tests
        run: dotnet test --filter "Unit" --no-build --verbosity normal

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Pull postgres image
        run: docker pull postgres:latest

      - name: Build
        run: dotnet build --no-restore

      - name: Integration Tests
        run: dotnet test --filter "Integration" --no-build --verbosity normal
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"