name: VetClinic CI

on:
  push:
    branches: [ main, 'feat/**' ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Unit Tests
        run: dotnet test --filter "Unit" --no-build --verbosity normal

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Pull postgres image
        run: docker pull postgres:latest

      - name: Build
        run: dotnet build --no-restore

      - name: Integration Tests
        run: dotnet test --filter "Integration" --no-build --verbosity normal
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"

  full-pipeline:
    name: Full Pipeline
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - name: Pipeline Complete
        run: echo "All tests passed"

  performance:
    if: github.ref == 'refs/heads/main'
    needs: full-pipeline
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: vetclinic_perf
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: [ "5432:5432" ]
        options: --health-cmd pg_isready --health-interval 10s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run API
        run: |
          dotnet build src/VetClinic.Api -c Release
          dotnet run --project src/VetClinic.Api -c Release &
          sleep 15
        env:
          ConnectionStrings__DefaultConnection: >
            Host=localhost;Port=5432;Database=vetclinic_perf;
            Username=postgres;Password=postgres

      - name: Install k6
        run: |
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run k6
        run: k6 run load-test.js --vus 10 --duration 30s \
             --env BASE_URL=http://localhost:5000
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: k6-summary.json